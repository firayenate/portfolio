<!DOCTYPE html>
<html>
    <head>
        <title>Vue 3 Basics</title>
        <style>
            /* .box{
                background-color: purple;
                height: 200px;
                width: 200px;
            }
             */
        </style>
    </head>
    <body>
        <div id="app">
            <login-form/>
        
           <hr />
            <button @:click="toggleBox">Toggle Box</button>
           <div v-if="isVisible" class="box"></div>
        
        </div>

       <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

      <script>
        let app = Vue.createApp({
            data:function(){
                return{
                  greeting: 'Hello vue!',
                    isVisible:false
                  
                }
            },
          methods:{
            toggleBox(){
                this.isVisible = !this.isVisible
            },
            greet(greeting){
                console.log(greeting)
            }
          }  
        })

        app.component('login-from',{
            template: 
            <div>
                <input type="email" />
                <input type="password" />
            </div>
            
            
        })
        app.mount('#app')
      </script>
    </body>
</html>
